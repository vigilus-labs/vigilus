version: "3.8"

services:
  vigilus:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vigilus
    ports:
      - "${VIGILUS_PORT:-8000}:8000"
    environment:
      - VIGILUS_SECRET=${VIGILUS_SECRET:?VIGILUS_SECRET is required}
      - VIGILUS_DATABASE_URL=${VIGILUS_DATABASE_URL:-sqlite+aiosqlite:///app/data/vigilus.db}
      - VIGILUS_DATA_DIR=/app/data
      - VIGILUS_HOST=0.0.0.0
      - VIGILUS_PORT=8000
      - VIGILUS_TRUST_MODE=${VIGILUS_TRUST_MODE:-strict}
      - VIGILUS_LOG_LEVEL=${VIGILUS_LOG_LEVEL:-INFO}
    volumes:
      - vigilus-data:/app/data
      # Mount Docker socket for container management (read-only recommended)
      # Use docker-socket-proxy for production security
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Optional: Docker Socket Proxy for security
  # Uncomment to use instead of direct socket mount
  # docker-proxy:
  #   image: tecnativa/docker-socket-proxy
  #   container_name: vigilus-docker-proxy
  #   environment:
  #     - CONTAINERS=1
  #     - IMAGES=1
  #     - NETWORKS=1
  #     - VOLUMES=1
  #     - POST=0  # Read-only by default; set to 1 for write access
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   restart: unless-stopped

volumes:
  vigilus-data:
    driver: local
